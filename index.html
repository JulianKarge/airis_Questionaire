<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>

  <title>AIRIS UX Study</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="header">
    <div class="header-brand">
      <div class="logo-mark">AI</div>
      <span class="brand-name">AIRIS UX Study</span>

    <div class="header-right">
      <button class="lang-btn" id="langToggleBtn"></button>
